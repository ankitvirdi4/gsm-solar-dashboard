name: Refresh & deploy dashboard

# Hourly: rebuild the data snapshot from the Atlas Online Archive and deploy the
# static dashboard to GitHub Pages. The published Pages site is public — anyone
# with the URL can view it. The repo (code + secrets) stays as-is.
#
# Required repo secret (Settings → Secrets and variables → Actions):
#   MONGODB_URI   — the Atlas connection string (DB credential)
#
# Pages source: Settings → Pages → Build and deployment → Source = GitHub Actions.

on:
  schedule:
    - cron: '17 * * * *'     # 17 min past every hour (UTC) — avoids the congested top-of-hour slot
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install pymongo

      - name: Build data snapshot
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "::error::MONGODB_URI secret is not set"; exit 1
          fi
          python build.py
          python build_gsm.py   # GSM-only operations page (slow: per-device telemetry checks)

      - name: Assemble static site (only what should be published)
        run: |
          mkdir -p dist/data
          cp index.html gsm.html dist/
          cp data/data.json data/geo.json data/gsm.json dist/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
