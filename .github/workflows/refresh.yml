name: Refresh dashboard data

# Hourly: rebuild the data snapshot from the Atlas Online Archive and commit the
# fresh data/*.json back to main. The push triggers the Cloudflare Workers Git
# integration to auto-redeploy the dashboard at
# https://gsm-solar-dashboard.avirdi.workers.dev  with current data.
#
# Required repo secret (Settings → Secrets and variables → Actions):
#   MONGODB_URI   — the Atlas connection string (DB credential)

on:
  schedule:
    - cron: '17 * * * *'     # 17 min past every hour (UTC) — avoids the congested top-of-hour slot
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'              # don't loop on our own data commits

permissions:
  contents: write             # needed to commit the refreshed data back

# One refresh at a time; never cancel an in-progress commit/deploy.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install pymongo

      - name: Build data snapshot
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "::error::MONGODB_URI secret is not set"; exit 1
          fi
          python build.py
          python build_gsm.py   # GSM-only operations page (slow: per-device telemetry checks)

      - name: Commit refreshed data (triggers Cloudflare redeploy)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/gsm.json data/geo.json
          if git diff --cached --quiet; then
            echo "No data changes this run — nothing to commit."
          else
            git commit -m "Hourly data refresh [skip ci]"
            git push
            echo "Pushed fresh data → Cloudflare will redeploy the Worker."
          fi
